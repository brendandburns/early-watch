---
# Namespace for all EarlyWatch system resources.
apiVersion: v1
kind: Namespace
metadata:
  name: early-watch-system
  labels:
    app.kubernetes.io/name: early-watch
---
# ClusterRole grants the webhook server the permissions it needs.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: early-watch-role
  labels:
    app.kubernetes.io/name: early-watch
    app.kubernetes.io/component: webhook
rules:
  # Read ChangeValidator custom resources to evaluate rules.
  - apiGroups:
      - earlywatch.io
    resources:
      - changevalidators
    verbs:
      - get
      - list
      - watch
  # Update ChangeValidator status subresource.
  - apiGroups:
      - earlywatch.io
    resources:
      - changevalidators/status
    verbs:
      - get
      - patch
      - update
  # Read any resource so the ExistingResources check can query the cluster.
  - apiGroups:
      - "*"
    resources:
      - "*"
    verbs:
      - get
      - list
      - watch
  # Allow leader election.
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  # Allow recording events.
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: early-watch
  namespace: early-watch-system
  labels:
    app.kubernetes.io/name: early-watch
    app.kubernetes.io/component: webhook
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: early-watch-rolebinding
  labels:
    app.kubernetes.io/name: early-watch
    app.kubernetes.io/component: webhook
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: early-watch-role
subjects:
  - kind: ServiceAccount
    name: early-watch
    namespace: early-watch-system
