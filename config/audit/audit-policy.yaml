---
# Kubernetes Audit Policy for EarlyWatch Manual Touch Monitoring
#
# Apply this policy to the API server by passing:
#   --audit-policy-file=/etc/kubernetes/audit/audit-policy.yaml
#   --audit-webhook-config-file=/etc/kubernetes/audit/audit-webhook.yaml
#
# The policy captures RequestResponse-level events for write verbs on all
# resource types, ignoring high-volume read operations and system internals.
apiVersion: audit.k8s.io/v1
kind: Policy
rules:
  # Ignore read operations on all resources — these are too noisy and are
  # never manual touches as defined in EarlyWatch.
  - level: None
    verbs: ["get", "list", "watch"]

  # Ignore events generated by the system:nodes group (kubelets).
  - level: None
    userGroups: ["system:nodes"]

  # Ignore requests from the API server itself.
  - level: None
    users: ["system:apiserver"]

  # Ignore kube-controller-manager and kube-scheduler internal requests.
  - level: None
    users:
      - "system:kube-controller-manager"
      - "system:kube-scheduler"

  # Ignore changes to Lease objects used for leader election — these are
  # automated and extremely high-frequency.
  - level: None
    resources:
      - group: "coordination.k8s.io"
        resources: ["leases"]

  # Ignore changes to endpoint slice resources — automated and high-frequency.
  - level: None
    resources:
      - group: "discovery.k8s.io"
        resources: ["endpointslices"]
      - group: ""
        resources: ["endpoints"]

  # Ignore changes to events themselves to avoid recursion.
  - level: None
    resources:
      - group: ""
        resources: ["events"]

  # Capture RequestResponse-level audit events for all mutating verbs on all
  # remaining resources.  This gives EarlyWatch enough information to identify
  # manual touches (kubectl operations) by inspecting the User-Agent header.
  - level: RequestResponse
    verbs: ["create", "update", "patch", "delete", "deletecollection"]
    omitStages:
      - "RequestReceived"
