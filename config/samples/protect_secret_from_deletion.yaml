---
# ChangeValidator that prevents a Secret from being deleted while it is
# still referenced by any Deployment, DaemonSet, or CronJob in the same
# namespace.
#
# The NameReferenceCheck rule type lists each workload kind and specifies all
# field paths at which a Secret name may appear:
#   • spec.template.spec.volumes[*].secret.secretName           (volume mounts)
#   • spec.template.spec.(init)containers[*].envFrom[*].secretRef.name
#                                                          (full env injection)
#   • spec.template.spec.(init)containers[*].env[*].valueFrom.secretKeyRef.name
#                                                          (single key injection)
#   • spec.template.spec.imagePullSecrets[*].name               (image pull)
#
# Array elements along every path are traversed automatically, so there is no
# need for wildcard syntax in the field paths.
#
# Once applied, a DELETE on any Secret in the "default" namespace is denied
# when at least one Deployment, DaemonSet, or CronJob references it.
apiVersion: earlywatch.io/v1alpha1
kind: ChangeValidator
metadata:
  name: protect-secret-from-deletion-workloads
  namespace: default
spec:
  subject:
    apiGroup: ""        # core API group
    resource: secrets
  operations:
    - DELETE
  rules:
    - name: secret-not-referenced-by-workloads
      type: NameReferenceCheck
      nameReferenceCheck:
        sameNamespace: true
        resources:
          - apiGroup: apps
            resource: deployments
            version: v1
            nameFields:
              - spec.template.spec.volumes.secret.secretName
              - spec.template.spec.containers.envFrom.secretRef.name
              - spec.template.spec.initContainers.envFrom.secretRef.name
              - spec.template.spec.containers.env.valueFrom.secretKeyRef.name
              - spec.template.spec.initContainers.env.valueFrom.secretKeyRef.name
              - spec.template.spec.imagePullSecrets.name
          - apiGroup: apps
            resource: daemonsets
            version: v1
            nameFields:
              - spec.template.spec.volumes.secret.secretName
              - spec.template.spec.containers.envFrom.secretRef.name
              - spec.template.spec.initContainers.envFrom.secretRef.name
              - spec.template.spec.containers.env.valueFrom.secretKeyRef.name
              - spec.template.spec.initContainers.env.valueFrom.secretKeyRef.name
              - spec.template.spec.imagePullSecrets.name
          - apiGroup: batch
            resource: cronjobs
            version: v1
            nameFields:
              - spec.jobTemplate.spec.template.spec.volumes.secret.secretName
              - spec.jobTemplate.spec.template.spec.containers.envFrom.secretRef.name
              - spec.jobTemplate.spec.template.spec.initContainers.envFrom.secretRef.name
              - spec.jobTemplate.spec.template.spec.containers.env.valueFrom.secretKeyRef.name
              - spec.jobTemplate.spec.template.spec.initContainers.env.valueFrom.secretKeyRef.name
              - spec.jobTemplate.spec.template.spec.imagePullSecrets.name
      message: >
        Secret "{{name}}" in namespace "{{namespace}}" cannot be deleted
        because it is still referenced by one or more Deployments, DaemonSets,
        or CronJobs. Remove all references to the Secret from those workloads
        before deleting it.

---
# ChangeValidator that prevents a Secret from being deleted while it is
# referenced as a TLS certificate by an Ingress resource in the same namespace.
#
# Ingress resources reference Secrets for TLS termination via:
#   • spec.tls[*].secretName
#
# Once applied, a DELETE on any Secret in the "default" namespace is denied
# when at least one Ingress uses it for TLS.
apiVersion: earlywatch.io/v1alpha1
kind: ChangeValidator
metadata:
  name: protect-secret-from-deletion-ingress-tls
  namespace: default
spec:
  subject:
    apiGroup: ""        # core API group
    resource: secrets
  operations:
    - DELETE
  rules:
    - name: secret-not-referenced-by-ingress-tls
      type: NameReferenceCheck
      nameReferenceCheck:
        sameNamespace: true
        resources:
          - apiGroup: networking.k8s.io
            resource: ingresses
            version: v1
            nameFields:
              - spec.tls.secretName
      message: >
        Secret "{{name}}" in namespace "{{namespace}}" cannot be deleted
        because it is still referenced as a TLS certificate by one or more
        Ingress resources. Remove all TLS references to the Secret from those
        Ingress resources before deleting it.
