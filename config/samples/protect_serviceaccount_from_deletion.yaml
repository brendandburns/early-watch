---
# ChangeValidator that prevents a ServiceAccount from being deleted while it is
# still in use by a Pod or referenced from a Deployment, DaemonSet, or CronJob
# in the same namespace.
#
# ServiceAccounts are referenced in two ways:
#   • Directly by a running Pod:
#       spec.serviceAccountName
#
#   • Via the pod-template spec of a workload controller:
#       Deployment / DaemonSet: spec.template.spec.serviceAccountName
#       CronJob:                spec.jobTemplate.spec.template.spec.serviceAccountName
#
# Array elements along every path are traversed automatically, so there is no
# need for wildcard syntax in the field paths.
#
# Once applied, a DELETE on any ServiceAccount in the "default" namespace is
# denied when at least one of the above resources still references it.
apiVersion: earlywatch.io/v1alpha1
kind: ChangeValidator
metadata:
  name: protect-serviceaccount-from-deletion
  namespace: default
spec:
  subject:
    apiGroup: ""        # core API group
    resource: serviceaccounts
  operations:
    - DELETE
  rules:
    - name: serviceaccount-not-in-use
      type: NameReferenceCheck
      nameReferenceCheck:
        sameNamespace: true
        resources:
          - apiGroup: ""
            resource: pods
            version: v1
            nameFields:
              - spec.serviceAccountName
          - apiGroup: apps
            resource: deployments
            version: v1
            nameFields:
              - spec.template.spec.serviceAccountName
          - apiGroup: apps
            resource: daemonsets
            version: v1
            nameFields:
              - spec.template.spec.serviceAccountName
          - apiGroup: batch
            resource: cronjobs
            version: v1
            nameFields:
              - spec.jobTemplate.spec.template.spec.serviceAccountName
      message: >
        This ServiceAccount cannot be deleted because it is still in use by one
        or more Pods, Deployments, DaemonSets, or CronJobs. Remove or update all
        references to this ServiceAccount before deleting it.
