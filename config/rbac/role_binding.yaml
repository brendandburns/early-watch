---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: early-watch
  namespace: early-watch-system
  labels:
    app.kubernetes.io/name: early-watch
    app.kubernetes.io/component: webhook
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: early-watch-rolebinding
  labels:
    app.kubernetes.io/name: early-watch
    app.kubernetes.io/component: webhook
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: early-watch-role
subjects:
  - kind: ServiceAccount
    name: early-watch
    namespace: early-watch-system
