---
# ValidatingWebhookConfiguration instructs the Kubernetes API server to forward
# admission requests to the EarlyWatch webhook server before persisting changes.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: early-watch-validating-webhook
  labels:
    app.kubernetes.io/name: early-watch
    app.kubernetes.io/component: webhook
  annotations:
    # cert-manager injects the CA bundle automatically when this annotation
    # is present and cert-manager is installed in the cluster.
    cert-manager.io/inject-ca-from: early-watch-system/early-watch-serving-cert
webhooks:
  - name: validate.earlywatch.io
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: early-watch-webhook-service
        namespace: early-watch-system
        path: /validate
      # caBundle is populated by cert-manager or must be set manually.
      # caBundle: ""
    rules:
      # The webhook is registered for ALL resources so that ChangeGuard rules
      # can target any resource type without requiring a webhook restart.
      - apiGroups:
          - "*"
        apiVersions:
          - "*"
        operations:
          - CREATE
          - UPDATE
          - DELETE
          - CONNECT
        resources:
          - "*"
        scope: "*"
    failurePolicy: Ignore
    matchPolicy: Equivalent
    sideEffects: None
    timeoutSeconds: 10
    # Prevent the webhook from intercepting its own resources to avoid deadlocks.
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - early-watch-system
