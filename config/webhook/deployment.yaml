---
apiVersion: v1
kind: Namespace
metadata:
  name: early-watch-system
  labels:
    app.kubernetes.io/name: early-watch
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: early-watch-webhook
  namespace: early-watch-system
  labels:
    app.kubernetes.io/name: early-watch
    app.kubernetes.io/component: webhook
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: early-watch
      app.kubernetes.io/component: webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: early-watch
        app.kubernetes.io/component: webhook
    spec:
      serviceAccountName: early-watch
      containers:
        - name: webhook
          image: ghcr.io/brendandburns/early-watch/webhook:v0.0.1
          imagePullPolicy: IfNotPresent
          args:
            - --cert-dir=/tmp/k8s-webhook-server/serving-certs
            - --webhook-port=9443
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          ports:
            - name: webhook
              containerPort: 9443
              protocol: TCP
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: healthz
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: cert
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: cert
          secret:
            # This secret is managed by cert-manager (see config/certmanager/).
            # Replace with your own TLS secret if cert-manager is not available.
            secretName: early-watch-webhook-server-cert
      terminationGracePeriodSeconds: 10
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
