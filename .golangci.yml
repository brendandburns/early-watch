version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/brendandburns/early-watch

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - misspell
    - unconvert
    - unparam
    - exhaustive
    - godot
    - noctx
    - prealloc
    - revive
    - whitespace
  settings:
    misspell:
      locale: US
    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
            - sayRepetitiveInsteadOfStutters
        - name: error-strings
        - name: var-naming
        - name: unexported-return
        - name: indent-error-flow
    godot:
      scope: declarations
      capital: false
    exhaustive:
      default-signifies-exhaustive: true

  exclusions:
    # Exclude generated files from linting.
    paths:
      - zz_generated
    # Test files are allowed to use unexported helpers.
    rules:
      - path: _test\.go
        linters:
          - unparam
          - revive

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
